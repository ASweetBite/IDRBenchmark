# 核心全局配置
global:
  random_seed: 42
  max_workers: 8  # 统一控制所有并发环节的线程数
  result_dir: "./results"

# 运行参数
run_params:
  samples: 100
  dataset: "./data/big_vul.parquet"
  iterations: 20  # 对应 GA 的 max_generations 或 Greedy 的迭代逻辑
  algorithm: "greedy"
  run_mode: "attack"
  label_map: null

model_zoo:
  CodeBERT: "./models/finetuned_model_codebert_1"

# 候选词生成配置
lightweight_candidate:
  top_m: 15
  fasttext_model_path: "./models/fasttext_cpp.bin"
  faiss_index_path: "./models/faiss_cpp.index"
  faiss_vocab_path: "./models/vocab_cpp.json"

heavyweight_candidate:
  top_k_mlm: 60
  top_n_keep: 50
  semantic_threshold: 0.2
  structural_semantic_threshold: 0.5
  context_ratio: 0.3
  preserve_style: true

# 攻击者与优化器配置
irtg_attacker:
  top_k: 5  # RNNS 排序取前 K 个变量

genetic_algorithm:
  pop_size: 40
  stagnation_threshold: 5
  mutation_rate_min: 0.1
  mutation_rate_max: 0.5
  elite_ratio: 0.25

# 其他组件
analyzer:
  lang: "cpp"
mlm_engine:
  model_name: "microsoft/codebert-base-mlm"
smoother:
  num_samples: 50
  variance_threshold: 0.05
  replace_prob: 0.5
  batch_size: 32